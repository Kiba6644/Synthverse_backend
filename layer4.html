<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthverse | Layer 4 - Global Resilience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            --panel-bg: rgba(13, 17, 23, 0.95);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            overflow: hidden;
        }

        h1, h2, h3 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.05em;
        }

        #map {
            height: 100vh;
            width: 100vw;
            background: #0d1117;
        }

        #left-sidebar {
            display: none;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #left-sidebar.active {
            display: flex;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        #right-sidebar {
            width: 320px;
            height: auto;
            max-height: 80vh;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            top: 2rem;
            right: 2rem;
            border-radius: 2rem;
            transition: all 0.4s ease;
        }

        #right-sidebar.collapsed {
            transform: translateX(calc(100% + 2rem));
        }

        .toggle-control-btn {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 1001;
            width: 3.5rem;
            height: 3.5rem;
            background: #3b82f6;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            transition: all 0.3s ease;
        }

        .status-badge {
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 42px;
            height: 20px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #374151;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--danger);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        .impact-card {
            border-left: 4px solid var(--accent);
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .impact-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
            border-left-width: 8px;
        }

        /* Leaflet Overrides */
        .leaflet-container {
            background: #0d1117 !important;
        }
        .leaflet-bar a {
            background-color: var(--panel-bg) !important;
            color: #fff !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        @keyframes pulse-danger {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .critical-node {
            animation: pulse-danger 1.5s infinite;
        }

        .custom-tooltip {
            background: var(--panel-bg) !important;
            border: 1px solid var(--accent) !important;
            color: white !important;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            padding: 4px 10px;
        }

        .india-marker {
            filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.9));
        }

        .route-label {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.6rem;
            padding: 2px 4px;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Left Sidebar - Analysis Panel -->
    <div id="left-sidebar" class="fixed left-8 top-8 bottom-8 w-96 z-[1001] flex flex-col overflow-hidden">
        <div class="flex-1 flex flex-col overflow-hidden p-10 glass-panel rounded-[2rem] border-t border-white/10">
            <h3 class="text-xs font-black text-white mb-6 flex items-center gap-4 shrink-0 uppercase tracking-tighter">
                <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                TRADE FLOW STRESS ANALYSIS
            </h3>
            <div id="impact-metrics" class="flex-1 overflow-y-auto space-y-5 pr-4 custom-scrollbar">
            </div>
        </div>
    </div>

    <!-- Right Sidebar - Control Panel -->
    <div class="toggle-control-btn" onclick="document.getElementById('right-sidebar').classList.toggle('collapsed')">
        <i data-lucide="settings-2" class="text-white w-6 h-6"></i>
    </div>

    <!-- Right Sidebar - Control Panel -->
    <div id="right-sidebar" class="fixed collapsed">
        <div class="p-8 border-b border-white/5 bg-black/40">
            <div class="flex items-center justify-between mb-2">
                <p class="text-[0.65rem] font-bold text-blue-400 tracking-[0.2em] uppercase">Control Matrix</p>
                <div id="system-status" class="status-badge bg-green-500/20 text-green-400 border border-green-500/30">Active</div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
            <div id="chokepoint-list" class="space-y-4">
                <!-- Dynamically Populated -->
            </div>
        </div>
    </div>

    <script>
        // Constants & Configuration
        const API_URL = 'http://127.0.0.1:5000/api/layer4/simulate';
        const CHOKEPOINTS = [
            'Suez Canal', 'Panama Canal', 'Strait of Malacca', 
            'Strait of Hormuz', 'Bab-el-Mandeb', 'Cape of Good Hope', 'Sunda Strait', 'Lombok Strait'
        ];
        
        const nodeCoords = {
            "China": [35.8, 104.1], "India": [20.5, 78.9], "Japan": [36.2, 138.2],
            "South Korea": [35.9, 127.7], "Singapore": [1.35, 103.8], "Saudi Arabia": [23.8, 45.0],
            "Iraq": [33.2, 43.6], "UAE": [23.4, 53.8], "Qatar": [25.3, 51.1],
            "Kuwait": [29.3, 47.4], "Germany": [51.1, 10.4], "France": [46.2, 2.2],
            "UK": [55.3, -3.4], "USA": [37.0, -95.7], "Russia": [61.5, 105.3],
            "Brazil": [-14.2, -51.9], "Australia": [-25.2, 133.7], "Indonesia": [-0.78, 113.9],
            "South Africa": [-30.5, 22.9], "Suez Canal": [29.9, 32.5], "Strait of Malacca": [2.2, 102.2],
            "Strait of Hormuz": [26.6, 56.5], "Bab-el-Mandeb": [12.6, 43.3], "Cape of Good Hope": [-34.3, 18.5],
            "Sunda Strait": [-5.9, 105.9], "Lombok Strait": [-8.5, 115.8]
        };

        // Initialize Map
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false,
            minZoom: 2,
            maxZoom: 7
        }).setView([20, 60], 3);

        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        let activeRoutes = [];
        let activeMarkers = [];
        let blockedNodes = [];

        // India Hub Marker
        const indiaMarker = L.circleMarker(nodeCoords["India"], {
            radius: 12,
            color: '#374151',
            fillColor: '#3b82f6',
            fillOpacity: 0.1,
            weight: 2
        }).addTo(map);

        // UI Initialization
        function initUI() {
            lucide.createIcons();
            const list = document.getElementById('chokepoint-list');
            
            CHOKEPOINTS.forEach(cp => {
                const div = document.createElement('div');
                div.className = 'glass-panel p-5 rounded-2xl flex items-center justify-between group hover:border-blue-500/50 transition-all cursor-pointer border border-white/5';
                div.innerHTML = `
                    <div class="flex items-center gap-5">
                        <div class="w-2.5 h-2.5 rounded-full bg-blue-500 shadow-[0_0_12px_rgba(59,130,246,0.6)] group-hover:scale-125 transition-transform"></div>
                        <span class="text-sm font-black text-gray-200 uppercase tracking-tighter">${cp}</span>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="check-${cp.replace(/\s+/g, '-')}" onchange="toggleDisruption('${cp}', this)">
                        <span class="slider"></span>
                    </label>
                `;
                list.appendChild(div);
                
                // Add Marker to Map
                if (nodeCoords[cp]) {
                    const marker = L.circleMarker(nodeCoords[cp], {
                        radius: 8,
                        color: '#3b82f6',
                        fillColor: '#374151',
                        fillOpacity: 1.0,
                        weight: 2,
                        className: 'interactive-node'
                    }).addTo(map);

                    marker.on('click', () => {
                        const check = document.getElementById(`check-${cp.replace(/\s+/g, '-')}`);
                        if (check) {
                            check.checked = !check.checked;
                            toggleDisruption(cp, check);
                        }
                    });

                    marker.bindTooltip(cp, {
                        permanent: false,
                        direction: 'top',
                        className: 'custom-tooltip'
                    });
                    activeMarkers.push({ name: cp, marker });
                }
            });
        }

        // API Interaction
        async function toggleDisruption(chokepoint, checkbox) {
            if (checkbox.checked) {
                // Limit to 2 blockades
                if (blockedNodes.length >= 2) {
                    const oldest = blockedNodes.shift();
                    const oldCheck = document.getElementById(`check-${oldest.replace(/\s+/g, '-')}`);
                    if (oldCheck) oldCheck.checked = false;
                }
                blockedNodes.push(chokepoint);
            } else {
                blockedNodes = blockedNodes.filter(n => n !== chokepoint);
            }

            if (blockedNodes.length === 0) {
                clearSimulation();
                return;
            }

            document.getElementById('system-status').innerText = 'RECALCULATING FLOW...';
            document.getElementById('system-status').className = 'status-badge bg-orange-500/20 text-orange-400 border border-orange-500/30';

            try {
                const response = await axios.post(API_URL, { blocked_nodes: blockedNodes });
                if (response.data) {
                    renderSimulationResults(response.data);
                }
                
                document.getElementById('system-status').innerText = 'PROGNOSIS RENDERED';
                document.getElementById('system-status').className = 'status-badge bg-blue-500/20 text-blue-400 border border-blue-500/30';
            } catch (error) {
                console.warn('Simulation mismatch:', error);
                // Silent recovery for non-critical naming mismatches
                document.getElementById('system-status').innerText = 'Active Monitoring';
                document.getElementById('system-status').className = 'status-badge bg-green-500/20 text-green-400 border border-green-500/30';
            }
        }

        function clearSimulation() {
            activeRoutes.forEach(r => map.removeLayer(r));
            activeRoutes = [];
            document.getElementById('impact-metrics').innerHTML = '';
            document.getElementById('left-sidebar').classList.remove('active');
            
            // Reset Markers
            activeMarkers.forEach(m => {
                m.marker.setStyle({ color: '#3b82f6', fillColor: '#3b82f6' });
                m.marker.getElement()?.classList.remove('critical-node');
            });

            document.getElementById('system-status').innerText = 'Active Monitoring';
            document.getElementById('system-status').className = 'status-badge bg-green-500/20 text-green-400 border border-green-500/30';
        }

        function drawPath(pathArray, color, weight, opacity, isDashed = false, isBroken = false) {
            const latlngs = pathArray.filter(name => nodeCoords[name]).map(name => nodeCoords[name]);
            if (latlngs.length < 2) return null;
            
            const poly = L.polyline(latlngs, {
                color: color,
                weight: weight,
                opacity: opacity,
                dashArray: isBroken ? '2, 10' : (isDashed ? '8, 12' : null),
                lineJoin: 'round',
                smoothFactor: 2
            }).addTo(map);
            
            activeRoutes.push(poly);
            return poly;
        }

        function renderSimulationResults(data) {
            activeRoutes.forEach(r => map.removeLayer(r));
            activeRoutes = [];

            // Update Blocked Markers
            activeMarkers.forEach(m => {
                if (data.blocked_nodes.includes(m.name)) {
                    m.marker.setStyle({ color: '#ef4444', fillColor: '#ef4444' });
                    m.marker.getElement()?.classList.add('critical-node');
                } else {
                    m.marker.setStyle({ color: '#3b82f6', fillColor: '#3b82f6' });
                    m.marker.getElement()?.classList.remove('critical-node');
                }
            });

            const metricsContainer = document.getElementById('impact-metrics');
            metricsContainer.innerHTML = '';

            // 1. Overview Header
            const header = document.createElement('div');
            header.className = 'p-6 bg-red-900/20 border border-red-500/30 rounded-[1.5rem] mb-6 relative overflow-hidden';
            const valueUSD = (data.total_displaced_value / 1e9).toFixed(1);
            header.innerHTML = `
                <div class="flex justify-between items-center mb-3">
                    <p class="text-[0.7rem] text-red-500 font-black uppercase tracking-widest">TOTAL DISRUPTED VOLUME</p>
                    <i data-lucide="alert-triangle" class="w-5 h-5 text-red-500"></i>
                </div>
                <p class="text-3xl font-black text-white">$${valueUSD}B <span class="text-xs font-medium text-gray-500 uppercase tracking-tighter">Value At Immediate Risk</span></p>
            `;
            metricsContainer.appendChild(header);

            // 2. Cascading Effects List
            data.cascading_effects.forEach(effect => {
                const color = effect.is_collapsed ? '#ef4444' : (effect.severity > 1.4 ? '#f59e0b' : '#3b82f6');
                
                if (effect.is_collapsed) {
                    drawPath(effect.primary_path, '#ef4444', 4, 0.9, false, true);
                } else if (effect.is_rerouted) {
                    drawPath(effect.primary_path, '#374151', 2, 0.3, true);
                    drawPath(effect.alt_path, color, effect.severity * 2, 0.8, true);
                } else {
                    drawPath(effect.primary_path, color, effect.severity * 3, 0.8);
                }

                const card = document.createElement('div');
                const borderColor = effect.is_collapsed ? 'border-red-600' : (effect.severity > 1.4 ? 'border-orange-500' : 'border-blue-500');
                
                card.className = `p-6 rounded-[1.5rem] impact-card border-l-[6px] ${borderColor} bg-white/5 relative group transition-all duration-500`;
                if (effect.is_collapsed) card.classList.add('bg-red-900/10');

                const distInfo = effect.is_rerouted ? `<span class="text-orange-400">${effect.p_dist}nm ➜ ${effect.a_dist}nm</span>` : `<span class="text-gray-400">${effect.p_dist}nm</span>`;

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="space-y-1">
                            <p class="text-sm font-black text-white uppercase tracking-tighter">${effect.origin} ➜ INDIA</p>
                            <p class="text-[0.65rem] text-gray-500">
                                 ${effect.commodity} | ${distInfo}
                            </p>
                        </div>
                        <span class="status-badge ${effect.is_collapsed ? 'bg-red-600 text-white animate-pulse' : 'bg-blue-500/10 text-blue-400'}">${effect.status}</span>
                    </div>
                    
                    <div class="mb-4 bg-black/30 p-3 rounded-xl border border-white/5">
                        <p class="text-[0.55rem] text-gray-500 uppercase font-black mb-1">REDISTRIBUTION LOAD</p>
                        <p class="text-[0.7rem] font-bold ${effect.is_collapsed ? 'text-red-500' : 'text-blue-300'} uppercase">${effect.redistribution_load}</p>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <p class="text-[0.6rem] text-gray-600 uppercase font-black mb-1">ECON RISK</p>
                            <p class="text-lg font-black text-white">${effect.economic_risk}</p>
                        </div>
                        <div>
                            <p class="text-[0.6rem] text-gray-600 uppercase font-black mb-1">NETWORK SEVERITY</p>
                            <p class="text-lg font-black ${effect.severity > 3 ? 'text-red-600' : (effect.severity > 1.2 ? 'text-orange-500' : 'text-blue-500')}">${effect.severity.toFixed(2)}x</p>
                        </div>
                    </div>
                `;
                metricsContainer.appendChild(card);
            });
            
            // 3. Add Methodology Note at bottom
            const methodology = document.createElement('div');
            methodology.className = 'mt-8 p-6 glass-panel rounded-3xl border border-white/5 opacity-50 hover:opacity-100 transition-opacity';
            methodology.innerHTML = `
                <p class="text-[0.6rem] font-black text-blue-400 mb-3 uppercase tracking-widest">Methodology Guide</p>
                <div class="space-y-3">
                    <div>
                        <p class="text-[0.65rem] font-black text-gray-300">NETWORK SEVERITY</p>
                        <p class="text-[0.6rem] text-gray-500">Calculated GNN congestion ratio (Actual Volume / Max Safe Capacity). Values >1.0x indicate bottleneck stress.</p>
                    </div>
                    <div>
                        <p class="text-[0.65rem] font-black text-gray-300">ECONOMIC RISK</p>
                        <p class="text-[0.6rem] text-gray-500">Weighted impact of Rerouting Distance + Congestion Delay + Fuel Surcharges. Unique per destination.</p>
                    </div>
                </div>
            `;
            metricsContainer.appendChild(methodology);
            
            lucide.createIcons();
            document.getElementById('left-sidebar').classList.add('active');
        }

        window.onload = initUI;
    </script>
</body>
</html>
